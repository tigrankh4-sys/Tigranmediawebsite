version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      - npm run build

  post_build:
    commands:
      # Hashed _next/ assets — immutable 1-year cache
      - aws s3 sync out/_next/ s3://tigranmedia-website-new/_next/ --cache-control "public,max-age=31536000,immutable"
      # Everything else — no-cache, delete stale files
      - aws s3 sync out/ s3://tigranmedia-website-new --delete --cache-control "no-cache" --exclude "_next/*" --exclude "wijnen-waldo/*.webp" --exclude "wijnen-waldo/*.mp4" --exclude "projecten/*/*.mp4" --exclude "projecten/*/*.webm"
      - aws cloudfront create-invalidation --distribution-id EM0N7M5T0RYSC --paths "/*"

artifacts:
  files:
    - '**/*'
  base-directory: out
