version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      - npm run build

  post_build:
    commands:
      - aws s3 sync out/ s3://tigranmedia-website-new --delete --cache-control "public,max-age=31536000,immutable" --exclude "*.html" --exclude "wijnen-waldo/*.webp" --exclude "wijnen-waldo/*.mp4"
      - aws s3 sync out/ s3://tigranmedia-website-new --delete --cache-control "no-cache" --include "*.html" --exclude "wijnen-waldo/*.webp" --exclude "wijnen-waldo/*.mp4"
      - aws cloudfront create-invalidation --distribution-id EM0N7M5T0RYSC --paths "/*"

artifacts:
  files:
    - '**/*'
  base-directory: out
