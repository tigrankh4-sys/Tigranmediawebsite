version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      - npm run build

  post_build:
    commands:
      # Hashed _next/ assets — immutable 1-year cache
      - aws s3 sync out/_next/ s3://tigranmedia-website-new/_next/ --cache-control "public,max-age=31536000,immutable"
      # Self-hosted fonts — immutable 1-year cache
      - aws s3 sync out/fonts/ s3://tigranmedia-website-new/fonts/ --cache-control "public,max-age=31536000,immutable"
      # Images — 30-day cache (changes occasionally, content-addressed via filename)
      - aws s3 sync out/images/ s3://tigranmedia-website-new/images/ --cache-control "public,max-age=2592000"
      # SVG decorations — 30-day cache
      - aws s3 sync out/svg/ s3://tigranmedia-website-new/svg/ --cache-control "public,max-age=2592000"
      # Everything else — no-cache, delete stale files
      # NOTE: projecten/* is fully excluded — those pages are externally generated and managed manually in S3
      - aws s3 sync out/ s3://tigranmedia-website-new --delete --cache-control "no-cache" --exclude "_next/*" --exclude "fonts/*" --exclude "images/*" --exclude "svg/*" --exclude "wijnen-waldo/*.webp" --exclude "wijnen-waldo/*.mp4" --exclude "projecten/*"
      - aws cloudfront create-invalidation --distribution-id EM0N7M5T0RYSC --paths "/*"

artifacts:
  files:
    - '**/*'
  base-directory: out
